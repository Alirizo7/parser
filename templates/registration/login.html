<!doctype html>
<html lang="ru" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — Авто-аттестация</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <style>body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-slate-50 text-slate-800 antialiased">
  <div class="flex min-h-full items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">
      <div class="mb-8 flex flex-col items-center gap-3">
        <span class="grid h-12 w-12 place-items-center rounded-xl bg-indigo-600 text-lg font-semibold text-white">А</span>
        <h1 class="text-xl font-semibold text-slate-900">Авто-аттестация</h1>
        <p class="text-sm text-slate-500">Войдите, чтобы продолжить</p>
      </div>

      <form method="post" class="space-y-4 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        {% csrf_token %}

        {% if form.errors %}
          <div class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
            Неверное имя пользователя или пароль.
          </div>
        {% endif %}

        <div>
          <label for="id_username" class="mb-1 block text-sm font-medium text-slate-700">Имя пользователя</label>
          <input type="text" name="username" id="id_username" autofocus required autocomplete="username"
                 class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200">
        </div>

        <div>
          <label for="id_password" class="mb-1 block text-sm font-medium text-slate-700">Пароль</label>
          <input type="password" name="password" id="id_password" required autocomplete="current-password"
                 class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200">
        </div>

        <button type="submit"
                class="w-full rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm transition hover:bg-indigo-700">
          Войти
        </button>

        <input type="hidden" name="next" value="{{ next }}">
      </form>
    </div>
  </div>
</body>
</html>
