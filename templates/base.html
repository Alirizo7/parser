<!doctype html>
<html lang="ru" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Авто-аттестация{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
      } }
    }
  </script>
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://unpkg.com/alpinejs@3.13.10/dist/cdn.min.js"></script>
  <style>
    .cell-input {
      width: 100%; background: transparent; border: 1px solid transparent;
      border-radius: 6px; padding: 3px 6px; font-size: 13px; color: #1e293b;
    }
    .cell-input:hover { border-color: #e2e8f0; }
    .cell-input:focus { outline: none; border-color: #6366f1; background: #fff;
      box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
    .cell-flagged { background: #fffbeb; box-shadow: inset 0 0 0 1px #fde68a; }
    .cell-saved { animation: savedflash .9s ease; }
    @keyframes savedflash { 0% { background:#dcfce7; } 100% { background: transparent; } }
    .sticky-col { position: sticky; background: inherit; z-index: 1; }
  </style>
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
      class="h-full bg-slate-50 text-slate-800 antialiased">
  <nav class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
      <a href="{% url 'attestation:dashboard' %}" class="flex items-center gap-2 font-semibold text-slate-900">
        <span class="grid h-8 w-8 place-items-center rounded-lg bg-indigo-600 text-white">А</span>
        Авто-аттестация
      </a>
      <a href="{% url 'attestation:upload' %}"
         class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm transition hover:bg-indigo-700">
        + Новая загрузка
      </a>
    </div>
  </nav>

  <main class="mx-auto max-w-7xl px-4 py-8">
    {% if messages %}
      <div class="mb-6 space-y-2">
        {% for m in messages %}
          <div class="rounded-lg border px-4 py-3 text-sm
            {% if m.tags == 'error' %}border-red-200 bg-red-50 text-red-700
            {% else %}border-indigo-200 bg-indigo-50 text-indigo-700{% endif %}">{{ m }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <script>
    // Лёгкая подсветка ячейки после успешного автосохранения
    document.body.addEventListener('htmx:afterRequest', (e) => {
      const el = e.detail.elt;
      if (el.classList && el.classList.contains('cell-input') && e.detail.successful) {
        el.classList.remove('cell-saved'); void el.offsetWidth; el.classList.add('cell-saved');
      }
    });
  </script>
</body>
</html>
